[project]
name = "myconf"
version = "0.1.0"
description = "AG-Visio video conferencing with AI agent"
readme = "README.md"
requires-python = ">=3.10"

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "S", "UP", "RUF"]
ignore = ["S101", "B008"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
