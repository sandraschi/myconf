# Full stack: livekit, redis, web, agent.
# Ollama runs OUTSIDE Docker on your PC (start it yourself: ollama serve, ollama pull gemma2).
# The agent container reaches the host's Ollama via OLLAMA_BASE_URL=http://host.docker.internal:11434/v1.
services:
  livekit:
    build:
      context: .
      dockerfile: livekit.Dockerfile
    ports:
      - "15580:15580"
      - "15581:15581"
      - "15582:15582/udp"
    restart: always
    volumes:
      - livekit_data:/var/lib/livekit

  redis:
    image: redis:7-alpine
    command: redis-server --save 20 1
    ports:
      - "16379:6379"
    restart: always
    volumes:
      - redis_data:/data

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "15500:15500"
    environment:
      - NEXT_PUBLIC_LIVEKIT_URL=ws://localhost:15580
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-secret}
      - HOSTNAME=0.0.0.0
      - OLLAMA_HOST=http://host.docker.internal:11434
      - PORT=15500
    depends_on:
      - livekit
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"

  agent:
    build:
      context: .
      dockerfile: apps/agent/Dockerfile
    environment:
      - LIVEKIT_URL=ws://livekit:15580
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-secret}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434/v1
      - OLLAMA_MODEL=gemma2
    depends_on:
      - livekit
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - lancedb_data:/app/lancedb_data

volumes:
  livekit_data:
  redis_data:
  lancedb_data:

  # Optional: Authentik identity provider
