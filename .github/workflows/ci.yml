name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Windows-only by design: remoting_mcp, contacts, and vision substrates are
# Windows-native (pywin32/pynput/mss are unconditional deps). Do not add
# ubuntu runners without platform markers in pyproject.toml.

jobs:
  web:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install dependencies (workspace root)
        run: npm ci
      - name: Lint web
        run: npm run lint --workspace=web
      - name: Type check web
        run: npx tsc --noEmit -p apps/web
      - name: Test web
        run: npm run test --workspace=web

  python:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --dev
      - name: Ruff check
        run: uv run ruff check apps/agent/ packages/ myconf/ tests/
      - name: Ruff format check
        run: uv run ruff format --check apps/agent/ packages/ myconf/ tests/
      - name: Pytest
        run: uv run pytest tests/ apps/agent/tests/ -v --tb=short --junit-xml=test-results.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml
