name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Lint web
        run: npm run lint --workspace=web
      - name: Type check web
        run: npm run check-types --workspace=web
      - name: Build web
        run: npm run build --workspace=web
      - name: Test web
        run: npm run test --workspace=web

  python-compliance-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Install all dependencies
        run: uv sync --all-extras --dev
      - name: Ruff Check (Monorepo)
        run: uv run ruff check apps/ packages/
      - name: Ruff Style (Monorepo)
        run: uv run ruff format --check apps/ packages/
      - name: MyPy Check
        run: uv run mypy apps/ packages/
      - name: Monorepo Tests (Pytest)
        run: |
          uv run pytest tests/ \
            --cov=apps/agent \
            --cov=packages/remoting-mcp \
            --cov=packages/conferencing-mcp \
            --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          fail_ci_if_error: false
